[workspace]
members = [
    "packages/blitz-dom",
    "packages/blitz-paint",
    "packages/blitz-traits",
    "packages/debug_timer",
    "packages/stylo_taffy",
]
resolver = "2"

[workspace.package]
version = "0.3.0-alpha.4"
license = "MIT OR Apache-2.0"
homepage = "https://github.com/dioxuslabs/blitz"
repository = "https://github.com/dioxuslabs/blitz"
categories = ["gui"]
edition = "2024"
rust-version = "1.89.0"

[workspace.dependencies]
blitz-dom = { version = "=0.3.0-alpha.4", path = "./packages/blitz-dom", default-features = false }
blitz-paint = { version = "=0.3.0-alpha.4", path = "./packages/blitz-paint", default-features = false }
blitz-traits = { version = "=0.3.0-alpha.4", path = "./packages/blitz-traits", default-features = false }
debug_timer = { version = "0.1.3", path = "./packages/debug_timer" }
stylo_taffy = { version = "=0.3.0-alpha.4", path = "./packages/stylo_taffy", default-features = false }

accesskit = "0.24"
anyrender = "0.11.0"
anyrender_svg = "0.12.0"
app_units = "0.7.5"
atomic_refcell = "0.1.13"
bitflags = "2.8.0"
bytes = "1.7.1"
color = "0.3"
cssparser = "0.37.0"
cursor-icon = "1"
euclid = "0.22"
html-escape = "0.2.13"
http = "1.1.0"
image = { version = "=0.25.6", default-features = false }
keyboard-types = "0.7"
kurbo = "0.13.1"
linebender_resource_handle = "0.1"
markup5ever = "0.39.0"
parley = { version = "0.10", default-features = false, features = ["std"] }
peniko = "0.6.0"
percent-encoding = "2.3.1"
rayon = "1"
selectors = { version = "0.38.0", package = "selectors" }
serde = "1"
skrifa = { version = "0.42", default-features = false, features = ["std"] }
slab = "0.4.9"
smallvec = "1"
smol_str = "0.3"
style = { version = "0.18.0", package = "stylo" }
style_atoms = { version = "0.18.0", package = "stylo_atoms" }
style_config = { version = "0.18.0", package = "stylo_static_prefs" }
style_dom = { version = "0.18.0", package = "stylo_dom" }
style_traits = { version = "0.18.0", package = "stylo_traits" }
taffy = { version = "=0.11.0-experimental-cache-fix.3", default-features = false, features = [
    "std",
    "flexbox",
    "grid",
    "block_layout",
    "content_size",
    "calc",
    "detailed_layout_info",
] }
thread_local = "1"
tracing = "0.1.40"
url = "2.5.0"
usvg = "0.46"
web-time = "1"
wuff = "0.2"
